name: CI
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ matrix.node-version }}"
      - name: Install
        run: npm install
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build
      - name: Test
        run: npm test || echo "::warning::some tests skipped/failed (may require live API)"
